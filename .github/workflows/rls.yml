name: rls
on: workflow_dispatch
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete old release
        run: gh release delete tqs --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install pkgs
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-tools

      - name: Archive cfg/
        run: |
          chmod -R 755 ./cfg/usr/bin
          bsdtar -b1 -C ./cfg -cv . > ./cfg.tar
          rm -rf ./cfg

      - name: Compress
        run: |
          zip -9r ./tqs.zip -- ./*

      - name: Release
        run: gh release create tqs ./tqs.zip
        env:
          GH_TOKEN: ${{ github.token }}
